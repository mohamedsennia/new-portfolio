<app-nav>
    <h1>Settings</h1>
</app-nav>
<div class="flex items-center justify-center mt-60">
    <div class="w-100 p-5 bg-[#ebb871] rounded-lg flex flex-col justify-center items-center gap-4">
        <h2 class="">Visual settings</h2>
        <input type="checkbox" id="theme-toggle" class="toggle-input" [checked]="isDark" (change)="toggleMode()">
        <label for="theme-toggle" class="toggle-label">
        <span class="toggle-thumb">
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </span>
        </label>
    </div>
</div>
